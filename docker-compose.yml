version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: smart-community-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_community
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Redis缓存
  redis:
    image: redis:7.0
    container_name: smart-community-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # AI算法服务
  ai-service:
    build:
      context: ./ai-algorithm
      dockerfile: Dockerfile
    container_name: smart-community-ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          memory: 4G

  # API网关
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: smart-community-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G

  # 用户服务
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: smart-community-user
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    deploy:
      resources:
        limits:
          memory: 2G

  # PC Web前端
  pc-web:
    build:
      context: ./frontend/pc-web
      dockerfile: Dockerfile
    container_name: smart-community-pc-web
    ports:
      - "3000:80"
    depends_on:
      - gateway

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: smart-community-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - gateway
      - pc-web

volumes:
  mysql_data:
  redis_data: